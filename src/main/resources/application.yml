server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # User Service Routes
        - id: user-service-auth
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**, /auth/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: user-service-profile
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/profile/**, /profile/**, /api/users/me/**, /users/me/**, /api/user/**, /user/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: user-service-notifications
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/notifications/**, /notifications/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        # Core Service Routes
        - id: core-service-global
          uri: ${CORE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/locations/**, /locations/**, /api/filter-options, /filter-options
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: core-service-lands
          uri: ${CORE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/listings/**, /listings/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: core-service-professionals
          uri: ${CORE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/professionals/**, /professionals/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        # Payment Service Routes
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/payments/**, /payments/**, /api/payment/**, /payment/**, /api/transactions/**, /transactions/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: payment-service-subscriptions
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/subscriptions/**, /subscriptions/**
          filters:
            - RewritePath=/api/(?<segment>.*), /${segment}

        - id: payment-service-webhooks
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/webhooks/**
          filters:
            - StripPrefix=0

        - id: api-ping
          uri: http://localhost:8080
          predicates:
            - Path=/api/ping
          filters:
            - RewritePath=/api/ping, /actuator/health
        # Documentation & Health Routes (Unified Entry Point)
        - id: user-service-docs
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/user-service/v3/api-docs/**,/user-service/actuator/health
          filters:
            - RewritePath=/user-service/(?<segment>.*), /${segment}

        - id: core-service-docs
          uri: ${CORE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/core-service/v3/api-docs/**,/core-service/actuator/health
          filters:
            - RewritePath=/core-service/(?<segment>.*), /${segment}

        - id: payment-service-docs
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/payment-service/v3/api-docs/**,/payment-service/actuator/health
          filters:
            - RewritePath=/payment-service/(?<segment>.*), /${segment}

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin, RETAIN_FIRST

jwt:
  secret: ${JWT_SECRET:veryLongSecretKeyForJwtTokenSigningThatIsAtLeast256BitsLongForHS256Algorithm2024}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.landgo.gateway: DEBUG
